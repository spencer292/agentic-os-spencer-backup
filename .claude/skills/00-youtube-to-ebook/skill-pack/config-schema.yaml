# Config schema — 00-youtube-to-ebook
#
# See lib/config-merge.js for how this drives schema-driven merge on update.

version: 1.1.0

files:
  skill-pack/config/sys-config.md:
    format: markdown
    keys:
      - section: Article Style
        key: Default style
        default: editorial long-form (magazine feature)
        version_added: 1.0.0
      - section: Article Style
        key: Jargon handling
        default: explain inline on first use
        version_added: 1.0.0
      - section: Article Style
        key: Target length
        default: 2,000-5,000 words (scales with source)
        version_added: 1.0.0

      - section: PDF Format
        key: Design
        default: minimal
        version_added: 1.0.0
      - section: PDF Format
        key: Branding intensity
        default: subtle
        version_added: 1.0.0
      - section: PDF Format
        key: Tokens path
        default: brand_context/visual-identity/tokens.json
        version_added: 1.0.0

      - section: Header
        key: Show logo
        default: no
        version_added: 1.0.0
      - section: Header
        key: Show links
        default: no
        version_added: 1.0.0

      - section: Pipeline Behavior
        key: Fact-check checkpoint
        default: always pause for review
        version_added: 1.0.0
      - section: Pipeline Behavior
        key: Humanizer mode
        default: deep (if voice-profile exists), standard (otherwise)
        version_added: 1.0.0
      - section: Pipeline Behavior
        key: Copy PDF to ~/Downloads
        default: yes
        version_added: 1.0.0
