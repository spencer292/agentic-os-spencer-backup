# Config schema — tool-linkedin-scraper
#
# Declares config/sources.md as a user-data file: the user curates a list
# of LinkedIn profiles to scrape. On update we never overwrite their list
# but if we ship a new default we append it (.env-style append-missing).

version: 1.0.0

user_data_files:
  - path: config/sources.md
    template: config/sources.md
