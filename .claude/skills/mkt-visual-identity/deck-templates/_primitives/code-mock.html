<!doctype html>
<!--
  Primitive: code-mock
  Role: body
  Slots:
    eyebrow         (string, optional; "STEP 02" or "TIP 03")
    title_text      (string, max 35 chars)
    body_text       (string, max 280 chars; supports <strong> for inline emphasis)
    code_block      (HTML, monospace; up to ~16 lines; supports <span class="key|str|comment|accent">)
    page_indicator  (string, optional; "03 / 06")
-->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
{{ CSS_VARS }}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: {{ CANVAS_W }}px;
  height: {{ CANVAS_H }}px;
  background: var(--color-bg_light, #f2f0eb);
  color: var(--color-text_on_light, #0a0a0a);
  font-family: var(--font-body, system-ui, sans-serif);
  overflow: hidden;
}

body::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 30% 40%, rgba(0,0,0,0.012) 0%, transparent 50%),
    radial-gradient(circle at 70% 60%, rgba(0,0,0,0.018) 0%, transparent 50%);
  pointer-events: none;
}

.slide { position: relative; width: 100%; height: 100%; }

.dots {
  position: absolute; top: 80px; right: 80px;
  width: 180px; height: 110px;
  background-image: radial-gradient(circle, var(--color-text_muted, #9a9892) 1.8px, transparent 2px);
  background-size: 18px 18px; opacity: 0.55;
}

.eyebrow {
  position: absolute;
  top: 80px; left: 80px;
  font-family: ui-monospace, 'Geist Mono', monospace;
  font-size: var(--size-caption, 22px);
  letter-spacing: 0.16em;
  color: var(--color-accent, #e25a45);
  text-transform: uppercase;
}

h1 {
  position: absolute;
  top: 130px; left: 80px; right: 80px;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: var(--size-h1, 68px);
  line-height: var(--leading-h1, 1.05);
  letter-spacing: var(--tracking-h1, -0.045em);
  color: var(--color-text_on_light, #0a0a0a);
}

.body-text {
  position: absolute;
  top: 250px; left: 80px; right: 80px;
  font-size: var(--size-body, 30px);
  line-height: var(--leading-body, 1.35);
  color: var(--color-text_on_light, #0a0a0a);
}
.body-text strong { font-weight: 700; }

.code-frame {
  position: absolute;
  top: 470px; left: 100px; right: 100px;
  height: 720px;
  background: var(--color-bg_dark, #1d1c1c);
  color: var(--color-text_on_dark, #e8e6e0);
  border-radius: 10px;
  padding: 60px 50px;
  font-family: ui-monospace, 'Geist Mono', 'Courier New', monospace;
  font-size: 28px;
  line-height: 1.6;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  overflow: hidden;
  white-space: pre-wrap;
}
.code-frame .comment { color: #8a8580; }
.code-frame .key { color: var(--color-accent, #e25a45); }
.code-frame .str { color: var(--color-text_on_dark, #c8c4ba); }
.code-frame .accent { color: var(--color-accent, #e25a45); }
.code-frame .strike { text-decoration: line-through; text-decoration-color: var(--color-accent, #e25a45); }

.page-indicator {
  position: absolute; bottom: 60px; right: 80px;
  font-family: ui-monospace, 'Geist Mono', monospace;
  font-size: var(--size-caption, 22px);
  color: var(--color-text_muted, #5a5854);
  letter-spacing: 0.08em;
}
</style>
</head>
<body>
  <div class="slide">
    <div class="dots"></div>
    <div class="eyebrow">{{ eyebrow }}</div>
    <h1>{{ title_text }}</h1>
    <p class="body-text">{{ body_text }}</p>
    <pre class="code-frame">{{ code_block }}</pre>
    <div class="page-indicator">{{ page_indicator }}</div>
  </div>
</body>
</html>
