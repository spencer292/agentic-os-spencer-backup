<!doctype html>
<!--
  Primitive: question-card
  Role: cta
  Slots:
    eyebrow          (string, optional; "30-SECOND AUDIT")
    question_text    (string, max 100 chars; the actual question)
    accent_words     (string, optional; the part of question highlighted in accent color)
    micro_cta        (string, optional; "↓ DROP YOUR ANSWER IN THE COMMENTS")
    byline           (string, optional; author name)
    page_indicator   (string, optional; "06 / 06")
-->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
{{ CSS_VARS }}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: {{ CANVAS_W }}px;
  height: {{ CANVAS_H }}px;
  background: var(--color-bg_light, #f2f0eb);
  color: var(--color-text_on_light, #0a0a0a);
  font-family: var(--font-body, system-ui, sans-serif);
  overflow: hidden;
}

body::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 30% 40%, rgba(0,0,0,0.012) 0%, transparent 50%),
    radial-gradient(circle at 70% 60%, rgba(0,0,0,0.018) 0%, transparent 50%);
  pointer-events: none;
}

.slide { position: relative; width: 100%; height: 100%; padding: 80px; }

.dots {
  position: absolute; top: 80px; right: 80px;
  width: 180px; height: 110px;
  background-image: radial-gradient(circle, var(--color-text_muted, #9a9892) 1.8px, transparent 2px);
  background-size: 18px 18px; opacity: 0.55;
}

.question-mark {
  position: absolute;
  top: 120px; left: 80px;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 320px;
  line-height: 0.85;
  color: var(--color-accent, #e25a45);
  opacity: 0.35;
}

.eyebrow {
  position: absolute;
  top: 600px; left: 80px;
  font-family: ui-monospace, 'Geist Mono', monospace;
  font-size: var(--size-caption, 22px);
  letter-spacing: 0.16em;
  color: var(--color-text_muted, #5a5854);
  text-transform: uppercase;
}

.question {
  position: absolute;
  top: 660px; left: 80px; right: 80px;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 92px;
  line-height: 1.05;
  letter-spacing: -0.035em;
  color: var(--color-text_on_light, #0a0a0a);
}
.question .accent { color: var(--color-accent, #e25a45); font-style: italic; }

.micro-cta {
  position: absolute;
  bottom: 200px; left: 80px;
  font-family: ui-monospace, 'Geist Mono', monospace;
  font-size: var(--size-caption, 26px);
  letter-spacing: 0.12em;
  color: var(--color-accent, #e25a45);
  text-transform: uppercase;
}

.byline {
  position: absolute;
  bottom: 95px; left: 80px;
  font-size: var(--size-caption, 32px);
  color: var(--color-text_muted, #5a5854);
}

.page-indicator {
  position: absolute;
  bottom: 95px; right: 80px;
  font-family: ui-monospace, 'Geist Mono', monospace;
  font-size: var(--size-caption, 22px);
  color: var(--color-text_muted, #5a5854);
  letter-spacing: 0.08em;
}
</style>
</head>
<body>
  <div class="slide">
    <div class="dots"></div>
    <div class="question-mark">?</div>
    <div class="eyebrow">{{ eyebrow }}</div>
    <h1 class="question">{{ question_text }}</h1>
    <p class="micro-cta">{{ micro_cta }}</p>
    <p class="byline">{{ byline }}</p>
    <div class="page-indicator">{{ page_indicator }}</div>
  </div>
</body>
</html>
