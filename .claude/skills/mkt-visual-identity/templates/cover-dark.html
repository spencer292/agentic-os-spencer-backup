<!doctype html>
<!--
  Template: cover-dark  (v2 — editorial hero, Issue 09)
  Role: opening/cover slide of a carousel. Mixed-scale typography (oversized
        numeral + medium headline + small label) + header bar + footer tagline +
        optional grain texture + warm-gradient background. Replaces the v1
        Swiss-minimal cover with magazine-energy editorial layout.
  When to use: hook/intro slide for any carousel that wants the Story Framework
        editorial-essay energy instead of clean corporate type.

  Variables (use {{ }} substitution at render time):
    {{ header_date }}      e.g. "MAY 20"        (left chip in header bar)
    {{ header_handle }}    e.g. "@yourbrand" (mid chip)
    {{ header_role }}      e.g. "ESSAY"         (right chip — ESSAY, TUTORIAL, RECAP, etc.)
    {{ numeral }}           the oversized anchor numeral (e.g. "07", "1.0")
    {{ kicker }}            small caps label above the headline (e.g. "AGENTS WEEK / ISSUE 03")
    {{ headline_line_1 }}   first line of the headline (~38 chars max — see max_chars_headline)
    {{ headline_line_2 }}   optional second line, omit element if empty
    {{ subtitle }}          one-sentence subtitle / promise (~58 chars)
    {{ brand_name }}        author/brand name — renderer MUST pass; empty string when not set
    {{ tagline }}           footer tagline phrase, e.g. "Practitioner notes, not theory."

  Toggleable tokens (renderer can override these CSS vars):
    --bg-warm-gradient: when set to a gradient, replaces the flat dark bg
    --grain-url:         URL to a noise PNG; element class .grain renders if non-null
    --logo-x, --logo-y, --logo-size: locked logo placement (Issue 08)
    --font-size-*:       layout-token scale (Issue 08)

  Tokens consumed: fonts.display, colors.bg_dark, colors.accent, colors.text_on_dark
-->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: 'Display';
    src: url('../../brand_context/fonts/Geist-Black.ttf') format('truetype');
    font-weight: 900;
  }
  @font-face {
    font-family: 'Body';
    src: url('../../brand_context/fonts/Geist-Regular.ttf') format('truetype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'BodyBold';
    src: url('../../brand_context/fonts/Geist-Bold.ttf') format('truetype');
    font-weight: 700;
  }

  /* Issue 08 — layout tokens. Defaults baked in; the renderer can override with a
     later style block that redefines these :root vars (CSS cascade — last wins). */
  :root {
    --font-size-numeral:      340px;   /* oversized anchor — scale 1 */
    --font-size-headline:     108px;   /* main hook — scale 2 */
    --font-size-subhead:      42px;    /* subtitle — scale 3 */
    --font-size-kicker:       22px;    /* small caps label — scale 4 */
    --font-size-caption:      20px;    /* header chips, footer tagline */
    --line-height-headline:   0.98;
    --line-height-body:       1.4;
    --max-chars-headline:     38;      /* read by the renderer, not CSS */
    --max-chars-subhead:      58;
    --logo-x:                 75px;
    --logo-y:                 75px;
    --logo-size:              130px;
    --header-bar-y:           48px;
    --footer-bar-y:           48px;
    /* Background controls — toggle via renderer override */
    --bg-base:                #1d1c1c;
    --bg-warm-gradient:       radial-gradient(120% 80% at 15% 20%, rgba(226,90,69,0.18) 0%, rgba(232,178,62,0.08) 35%, transparent 70%), radial-gradient(60% 50% at 85% 90%, rgba(226,90,69,0.10) 0%, transparent 60%);
    --grain-opacity:          0.18;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px; height: 1350px;
    background: var(--bg-base);
    font-family: 'Body', system-ui, sans-serif;
    color: #e8e2d4;
    overflow: hidden;
    position: relative;
  }

  /* Warm gradient overlay — sits between background and content */
  body::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--bg-warm-gradient);
    pointer-events: none;
    z-index: 0;
  }

  /* Grain / noise texture overlay. Renderer can set --grain-url to a noise PNG
     in tokens.json > texture.grain_url to replace the inline SVG. */
  .grain {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: var(--grain-opacity);
    z-index: 1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.55'/></svg>");
    background-size: 200px 200px;
    mix-blend-mode: overlay;
  }

  .slide { position: relative; width: 1080px; height: 1350px; z-index: 2; }

  /* ─── Top header bar — three chips: date · handle · role ───────────── */
  .header-bar {
    position: absolute;
    top: var(--header-bar-y); left: 80px; right: 80px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: baseline;
    font-family: 'BodyBold', 'Body', sans-serif;
    font-weight: 700;
    font-size: var(--font-size-caption);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(232,226,212,0.78);
  }
  .header-bar .center { text-align: center; }
  .header-bar .right  { text-align: right; color: #e25a45; }

  /* Hairline rule under the header bar in the accent color */
  .header-rule {
    position: absolute;
    top: calc(var(--header-bar-y) + 36px); left: 80px; right: 80px;
    height: 1px;
    background: rgba(226,90,69,0.55);
  }

  /* Logo locked at the same position as every other slide (Issue 08) */
  .logo {
    position: absolute;
    top: var(--logo-y); left: var(--logo-x);
    width: var(--logo-size); height: var(--logo-size);
    opacity: 0.0;  /* hidden on the cover by default — the chip header carries identity here */
  }

  /* ─── Oversized numeral — scale 1, the visual anchor ──────────────── */
  .numeral {
    position: absolute;
    top: 200px; right: 60px;
    font-family: 'Display', sans-serif;
    font-weight: 900;
    font-size: var(--font-size-numeral);
    line-height: 0.85;
    letter-spacing: -0.05em;
    color: rgba(232,226,212,0.07);  /* ghosted — anchors the eye without competing */
    user-select: none;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Kicker — scale 4, small caps label above the headline ──────── */
  .kicker {
    position: absolute;
    top: 360px; left: 80px;
    font-family: 'BodyBold', 'Body', sans-serif;
    font-weight: 700;
    font-size: var(--font-size-kicker);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #e25a45;
  }

  /* ─── Headline — scale 2, the main hook ───────────────────────────── */
  h1 {
    position: absolute;
    top: 430px; left: 80px; right: 80px;
    font-family: 'Display', sans-serif;
    font-weight: 900;
    font-size: var(--font-size-headline);
    line-height: var(--line-height-headline);
    letter-spacing: -0.035em;
    color: #f3ece0;
  }
  h1 .l2 { color: #e25a45; }   /* second line gets accent color — editorial two-tone move */

  /* ─── Subtitle — scale 3, one-sentence promise ────────────────────── */
  .subtitle {
    position: absolute;
    top: 880px; left: 80px; right: 80px;
    font-family: 'Body', sans-serif;
    font-weight: 400;
    font-size: var(--font-size-subhead);
    line-height: var(--line-height-body);
    color: rgba(232,226,212,0.78);
  }

  /* ─── Bottom footer — brand name + tagline ────────────────────────── */
  .footer-rule {
    position: absolute;
    bottom: calc(var(--footer-bar-y) + 78px); left: 80px; right: 80px;
    height: 1px;
    background: rgba(232,226,212,0.18);
  }
  .footer-bar {
    position: absolute;
    bottom: var(--footer-bar-y); left: 80px; right: 80px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: baseline;
    font-family: 'Body', sans-serif;
    font-size: var(--font-size-caption);
    color: rgba(232,226,212,0.78);
  }
  .footer-bar .left  { font-family: 'BodyBold', 'Body', sans-serif; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #f3ece0; }
  .footer-bar .right { text-align: right; letter-spacing: 0.02em; font-style: italic; }

  /* Empty-state hiding for slots the renderer left blank */
  .kicker:empty, .subtitle:empty, h1 .l2:empty,
  .footer-bar .left:empty, .footer-bar .right:empty { display: none; }
</style>
</head>
<body>
  <div class="grain"></div>

  <div class="slide">
    <!-- locked logo position (hidden on cover by default; renderer can opacify) -->
    <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <polygon points="30,5 50,15 50,35 30,45 10,35 10,15" stroke="#e8e6e0" stroke-width="4" fill="none"/>
      <polygon points="70,5 90,15 90,35 70,45 50,35 50,15" stroke="#e8e6e0" stroke-width="4" fill="none"/>
      <polygon points="50,45 70,55 70,75 50,85 30,75 30,55" stroke="#e8e6e0" stroke-width="4" fill="none"/>
    </svg>

    <!-- Header bar: date · handle · role -->
    <div class="header-bar">
      <span class="left">{{ header_date }}</span>
      <span class="center">{{ header_handle }}</span>
      <span class="right">{{ header_role }}</span>
    </div>
    <div class="header-rule"></div>

    <!-- Oversized ghosted numeral — visual anchor -->
    <div class="numeral">{{ numeral }}</div>

    <!-- Kicker / issue label -->
    <div class="kicker">{{ kicker }}</div>

    <!-- Headline (1 or 2 lines; second line uses accent color) -->
    <h1>
      <span class="l1">{{ headline_line_1 }}</span>
      <span class="l2"> {{ headline_line_2 }}</span>
    </h1>

    <!-- Subtitle -->
    <p class="subtitle">{{ subtitle }}</p>

    <!-- Footer: brand name + tagline -->
    <div class="footer-rule"></div>
    <div class="footer-bar">
      <span class="left">{{ brand_name }}</span>
      <span class="right">{{ tagline }}</span>
    </div>
  </div>
</body>
</html>
